<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon -->
  <g id="icon">
    <!-- Anvil Base -->
    <path d="M15 50 L35 50 L35 60 L15 60 Z" fill="#2563EB"/>
    
    <!-- Anvil Body -->
    <path d="M10 30 L40 30 L45 50 L5 50 Z" fill="#2563EB"/>
    
    <!-- Anvil Horn -->
    <path d="M40 30 L55 30 L55 40 L45 40 Z" fill="#7C3AED"/>
    
    <!-- Circuit Nodes -->
    <circle cx="20" cy="15" r="2.5" fill="#06B6D4"/>
    <circle cx="35" cy="10" r="2.5" fill="#06B6D4"/>
    <circle cx="50" cy="15" r="2.5" fill="#06B6D4"/>
    
    <!-- Circuit Lines -->
    <line x1="20" y1="15" x2="20" y2="30" stroke="#06B6D4" stroke-width="2"/>
    <line x1="35" y1="10" x2="35" y2="30" stroke="#06B6D4" stroke-width="2"/>
    <line x1="50" y1="15" x2="50" y2="30" stroke="#06B6D4" stroke-width="2"/>
    <line x1="20" y1="15" x2="35" y2="10" stroke="#06B6D4" stroke-width="2"/>
    <line x1="35" y1="10" x2="50" y2="15" stroke="#06B6D4" stroke-width="2"/>
    
    <!-- Growth Arrow -->
    <path d="M25 65 L25 72 L21 68 M25 72 L29 68" stroke="#F97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <g id="text">
    <text x="75" y="45" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1E293B">
      Skill<tspan fill="#2563EB">Forge</tspan>
    </text>
    
    <!-- AI Badge -->
    <rect x="235" y="28" width="38" height="24" rx="5" fill="#7C3AED"/>
    <text x="254" y="44" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">AI</text>
  </g>
</svg>